services:
  nexus:
    image: sonatype/nexus3
    container_name: nexus
    volumes:
      - nexus-data:/nexus-data
    ports:
      - "8081:8081"
    healthcheck:
      test:
        ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  nexus-self-proxy:
    image: rg.fr-par.scw.cloud/asterius-public/nexus-self-proxy:v2.1.0
    container_name: nexus-self-proxy
    environment:
      # Authentication (optional — omit to run without auth)
      PROXY_BEARER_TOKEN: ${PROXY_BEARER_TOKEN}

      # Upstream registry overrides (all optional — defaults to public registries)
      # NPM_UPSTREAM_REGISTRY: https://registry.npmjs.org
      # PYPI_UPSTREAM_SIMPLE: https://pypi.org/simple
      # PYPI_UPSTREAM_FILES: https://files.pythonhosted.org
      # MAVEN_UPSTREAM_URL: https://repo1.maven.org/maven2
      # NUGET_UPSTREAM_URL: https://api.nuget.org
      # RUBYGEMS_UPSTREAM_URL: https://rubygems.org

      # Security scanner (optional — pick one or leave empty to disable)
      SECURITY_SCANNER: trivy
      # SECURITY_SCANNER: checkmarx

      # Trivy scanner settings
      TRIVY_BINARY: trivy
      TRIVY_SERVER_URL: http://trivy-server:4954
      TRIVY_TIMEOUT: "300"
      TRIVY_SEVERITY_THRESHOLD: CRITICAL,HIGH
      # TRIVY_EXTRA_ARGS: --skip-db-update

      # Checkmarx scanner settings
      # CHECKMARX_BASE_URL: https://eu-2.ast.checkmarx.net
      # CHECKMARX_IAM_URL: https://eu-2.iam.checkmarx.net
      # CHECKMARX_TENANT: ${CHECKMARX_TENANT}
      # CHECKMARX_CLIENT_ID: ${CHECKMARX_CLIENT_ID}
      # CHECKMARX_CLIENT_SECRET: ${CHECKMARX_CLIENT_SECRET}
      # CHECKMARX_PROJECT_NAME: nexus-proxy-sca
      # CHECKMARX_SCAN_TIMEOUT: "300"
      # CHECKMARX_SEVERITY_THRESHOLD: CRITICAL,HIGH
    depends_on:
      nexus:
        condition: service_healthy
      trivy-server:
        condition: service_healthy
    restart: unless-stopped

  trivy-server:
    image: aquasec/trivy:0.69.3
    container_name: trivy-server
    command: ["server", "--listen", "0.0.0.0:4954"]
    volumes:
      - trivy-cache:/root/.cache/trivy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4954/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  nexus-data:
  trivy-cache:
